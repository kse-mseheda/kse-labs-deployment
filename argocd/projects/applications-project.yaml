apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: applications
  namespace: argocd
spec:
  description: Application services
  sourceRepos:
    - https://github.com/kse-mseheda/kse-labs-deployment.git
  destinations:
    - namespace: applications
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceWhitelist:
    - group: apps
      kind: Deployment
    - group: ''
      kind: Service
    - group: networking.k8s.io
      kind: Ingress
    - group: ''
      kind: Secret
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: ServiceAccount
    - group: external-secrets.io
      kind: ExternalSecret
    - group: ''
      kind: LimitRange
    # vuln-api (Lecture 10) ships a ServiceMonitor so kube-prometheus-stack scrapes
    # its /metrics, and the practice adds a PrometheusRule for attack alerts.
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PrometheusRule
