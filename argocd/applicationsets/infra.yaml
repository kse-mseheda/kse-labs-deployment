apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/kse-mseheda/kse-labs-deployment.git
        revision: main
        directories:
          - path: infra/*
  template:
    metadata:
      name: 'infra-{{path.basename}}'
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
    spec:
      project: infra
      source:
        repoURL: https://github.com/kse-mseheda/kse-labs-deployment.git
        targetRevision: main
        path: '{{path}}'
        directory:
          # Recurse through subdirectories so apps can organize their
          # YAMLs into per-topic folders (e.g. gatekeeper-policies
          # groups related files into read-only-root-fs/, etc.).
          # Helm chart apps ignore this field.
          recurse: true
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
