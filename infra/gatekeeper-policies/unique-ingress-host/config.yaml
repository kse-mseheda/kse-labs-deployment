# Tells Gatekeeper to watch and cache Ingress resources so the
# k8suniqueingresshost rule can read them via `data.inventory`.
# Without this, the inventory is empty and the policy silently passes
# every request.
apiVersion: config.gatekeeper.sh/v1alpha1
kind: Config
metadata:
  name: config
  namespace: gatekeeper
spec:
  sync:
    syncOnly:
      - group: "networking.k8s.io"
        version: "v1"
        kind: "Ingress"
