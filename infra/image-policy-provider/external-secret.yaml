# Pulls the GHCR PAT out of Vault (secret/github/ghcr-pull-secret) and
# materializes it as a kubernetes.io/dockerconfigjson Secret in this
# namespace. The Deployment references it via imagePullSecrets so the
# kubelet can pull ghcr.io/kse-bd8338bbe006/image-policy-provider
# (which is a private package, not a public one).
#
# The ClusterSecretStore `vault-backend` is provisioned outside this
# Application; it authenticates ESO to Vault and is referenceable from
# any namespace.
#
# Sync-wave 19: must exist before the Deployment (wave 25) and before
# the Certificate (wave 20) because admission webhooks may need the
# pull secret if cert-manager ever rotates its own image and we
# happened to mirror it. Idempotent -- ESO owns the secret and
# refreshes hourly.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  namespace: image-policy-provider
  annotations:
    argocd.argoproj.io/sync-wave: "19"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"{{ .dockerServer }}":{"username":"{{ .dockerUsername }}","password":"{{ .dockerPassword }}"}}}
  data:
    - secretKey: dockerServer
      remoteRef:
        key: secret/data/github/ghcr-pull-secret
        property: docker-server
    - secretKey: dockerUsername
      remoteRef:
        key: secret/data/github/ghcr-pull-secret
        property: docker-username
    - secretKey: dockerPassword
      remoteRef:
        key: secret/data/github/ghcr-pull-secret
        property: docker-password
