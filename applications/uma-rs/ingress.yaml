apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uma-rs
  namespace: applications
  annotations:
    cert-manager.io/cluster-issuer: vault-pki-int
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - uma-rs.192.168.50.10.nip.io
      secretName: uma-rs-tls
  rules:
    - host: uma-rs.192.168.50.10.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: uma-rs
                port:
                  number: 80
