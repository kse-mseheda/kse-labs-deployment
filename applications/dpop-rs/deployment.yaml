apiVersion: apps/v1
kind: Deployment
metadata:
  name: dpop-rs
  namespace: applications
  labels:
    app.kubernetes.io/name: dpop-rs
    owner: platform-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dpop-rs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dpop-rs
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dpop-rs
          # CI (dpop-rs repo) builds this tag; bump it to redeploy a new build.
          image: ghcr.io/kse-bd8338bbe006/dpop-rs:0e6d94259b0f61cb947a6d17c21058b0182d2445
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: KEYCLOAK_ISSUER_URI
              value: https://keycloak.192.168.50.10.nip.io/realms/api-security
            - name: PUBLIC_BASE_URL
              value: https://dpop-rs.192.168.50.10.nip.io
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
