apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payments-svc
  namespace: applications
  annotations:
    cert-manager.io/cluster-issuer: vault-pki-int
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - payments-svc.192.168.50.10.nip.io
      secretName: payments-svc-tls
  rules:
    - host: payments-svc.192.168.50.10.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: payments-svc
                port:
                  number: 80
