apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-svc
  namespace: applications
  labels:
    app.kubernetes.io/name: payments-svc
    owner: platform-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: payments-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payments-svc
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: payments-svc
          # CI (oauth-multiservice repo) bumps this tag; :latest until the first build.
          image: ghcr.io/kse-bd8338bbe006/payments-svc:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: KEYCLOAK_URL
              value: "https://keycloak.192.168.50.10.nip.io"
            - name: REALM
              value: "api-security"
            - name: AUDIENCE
              value: "payments-svc"
            - name: OPENFGA_URL
              value: "https://openfga.192.168.50.10.nip.io"
            # Set after running setup/openfga_apply_model.py (same store id as orders-svc)
            - name: OPENFGA_STORE_ID
              value: ""
            - name: VERIFY_TLS
              value: "false"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { cpu: "1", memory: 192Mi }
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
