apiVersion: apps/v1
kind: Deployment
metadata:
  name: spa-token-demo
  namespace: applications
  labels:
    app.kubernetes.io/name: spa-token-demo
    owner: platform-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spa-token-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spa-token-demo
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Build a JVM truststore that trusts the kse-labs internal PKI so the app
        # can fetch the Keycloak JWKS over HTTPS (cert issued by the kse-labs CA,
        # which is not in the default JDK cacerts).
        - name: import-ca
          image: eclipse-temurin:21-jdk
          command:
            - sh
            - -c
            - |
              set -e
              cp /opt/java/openjdk/lib/security/cacerts /truststore/cacerts
              keytool -importcert -noprompt -alias kse-labs-root \
                -file /ca/root.crt -keystore /truststore/cacerts -storepass changeit
              keytool -importcert -noprompt -alias kse-labs-intermediate \
                -file /ca/intermediate.crt -keystore /truststore/cacerts -storepass changeit
              echo "Imported kse-labs CAs:"
              keytool -list -keystore /truststore/cacerts -storepass changeit | grep -i kse-labs
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: truststore
              mountPath: /truststore
            - name: ca-certs
              mountPath: /ca
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      containers:
        - name: spa-token-demo
          image: ghcr.io/kse-mseheda/spa-token-demo:729a9a2b401a7d1cd2ee97e6c9848c6df3c6a98a
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: DB_HOST
              value: "192.168.50.10"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: spa_token_demo
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: spa-token-demo-db
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spa-token-demo-db
                  key: password
            - name: KEYCLOAK_ISSUER_URI
              value: https://keycloak.192.168.50.10.nip.io/realms/api-security
            - name: JAVA_TOOL_OPTIONS
              value: >-
                -Djavax.net.ssl.trustStore=/truststore/cacerts
                -Djavax.net.ssl.trustStorePassword=changeit
                -Djavax.net.ssl.trustStoreType=PKCS12
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: truststore
              mountPath: /truststore
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: truststore
          emptyDir: {}
        - name: ca-certs
          configMap:
            name: kse-labs-ca
