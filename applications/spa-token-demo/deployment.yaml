apiVersion: apps/v1
kind: Deployment
metadata:
  name: spa-token-demo
  namespace: applications
  labels:
    app.kubernetes.io/name: spa-token-demo
    owner: platform-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spa-token-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spa-token-demo
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: spa-token-demo
          image: ghcr.io/kse-mseheda/spa-token-demo:729a9a2b401a7d1cd2ee97e6c9848c6df3c6a98a
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: DB_HOST
              value: "192.168.50.10"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: spa_token_demo
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: spa-token-demo-db
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spa-token-demo-db
                  key: password
            - name: KEYCLOAK_ISSUER_URI
              value: https://keycloak.192.168.50.10.nip.io/realms/api-security
            # The app validates the Keycloak JWKS TLS cert against app.internal-ca,
            # NOT the JVM truststore. The CA baked into the image is stale and no
            # longer matches the live Vault PKI, so point it at the current CA chain.
            - name: SPRING_APPLICATION_JSON
              value: '{"app":{"internal-ca":"file:/etc/kse-pki/internal-ca.pem"}}'
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: kse-pki
              mountPath: /etc/kse-pki
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: kse-pki
          configMap:
            name: kse-labs-ca
