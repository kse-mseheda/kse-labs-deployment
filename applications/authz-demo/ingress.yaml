apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authz-demo
  namespace: applications
  annotations:
    cert-manager.io/cluster-issuer: vault-pki-int
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - authz-demo.192.168.50.10.nip.io
      secretName: authz-demo-tls
  rules:
    - host: authz-demo.192.168.50.10.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authz-demo
                port:
                  number: 80
