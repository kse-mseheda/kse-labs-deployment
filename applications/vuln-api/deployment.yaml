apiVersion: apps/v1
kind: Deployment
metadata:
  name: vuln-api
  namespace: applications
  labels:
    app.kubernetes.io/name: vuln-api
    owner: platform-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vuln-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vuln-api
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vuln-api
          # CI (vuln-api repo) builds this tag; bump it to redeploy a new build.
          image: ghcr.io/kse-mseheda/vuln-api:9cdffc1348a82a2e163ace9d7ed87a0ffaf642e5
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            # false = vulnerable (default). Students flip this to "true" to apply
            # the fixes (ownership check + allowlist/schema + signature verify).
            - name: SECURE_MODE
              value: "false"
            - name: KEYCLOAK_ISSUER_URI
              value: https://keycloak.192.168.50.10.nip.io/realms/api-security
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # gunicorn writes a worker heartbeat file under /tmp; the root fs is
            # read-only, so give it a small in-memory scratch dir.
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: "1"
              memory: 192Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
